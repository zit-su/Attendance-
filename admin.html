<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPT Admin - Secure Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Admin Login Screen -->
        <div id="adminLoginScreen" class="screen active">
            <div class="login-wrapper">
                <div class="logo-section">
                    <div class="logo-icon"><i class="fas fa-user-shield"></i></div>
                    <h1 class="app-title">Admin Access</h1>
                    <p class="app-subtitle">Secure Authentication Required</p>
                </div>
                <div class="login-card">
                    <form id="adminLoginForm" class="login-form">
                        <div class="input-group">
                            <label><i class="fas fa-lock"></i> Admin PIN</label>
                            <input type="password" id="adminPin" placeholder="Enter admin PIN" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">
                            <i class="fas fa-unlock-alt"></i> Unlock Panel
                        </button>
                    </form>
                </div>
                <p class="powered-by">TPT Solutions &copy; 2026</p>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="screen">
            <header class="app-header">
                <div class="header-left">
                    <span class="header-title"><i class="fas fa-user-shield"></i> Admin Panel</span>
                </div>
                <div class="header-right">
                    <button id="adminLogoutBtn" class="icon-btn logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <main class="main-content">
                <!-- Employee List -->
                <div class="card">
                    <h3><i class="fas fa-users"></i> Employees</h3>
                    <div id="employeeListContainer" style="max-height: 250px; overflow-y: auto;">
                        <div class="empty-state"><i class="fas fa-user-slash"></i><p>No employees found</p></div>
                    </div>
                    <button id="addEmployeeBtn" class="btn btn-primary btn-block" style="margin-top: 1rem;">
                        <i class="fas fa-plus"></i> Add Employee
                    </button>
                </div>

                <!-- Today's Attendance -->
                <div class="card">
                    <h3><i class="fas fa-calendar-check"></i> Today's Attendance</h3>
                    <div id="todayAttendanceList">
                        <div class="empty-state"><i class="far fa-calendar-alt"></i><p>No records for today</p></div>
                    </div>
                </div>

                <!-- 🔥 NEW: Attendance Correction Card -->
                <div class="card">
                    <h3><i class="fas fa-edit"></i> Attendance Correction</h3>
                    <div class="input-group" style="margin-bottom: 0.8rem;">
                        <label>Select Employee</label>
                        <select id="correctionEmp" style="width:100%; padding:0.7rem; border-radius:12px; border:1px solid #e2e8f0;">
                            <option value="">— Choose —</option>
                        </select>
                    </div>
                    <div class="input-group" style="margin-bottom: 0.8rem;">
                        <label>Date</label>
                        <input type="date" id="correctionDate" style="width:100%; padding:0.7rem; border-radius:12px; border:1px solid #e2e8f0;">
                    </div>
                    <div id="correctionCurrent" style="margin-bottom: 0.8rem; font-size:0.85rem; color:#64748b;"></div>
                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                        <button id="markHalfDayBtn" class="btn btn-warning" style="flex:1;"><i class="fas fa-adjust"></i> Half Day</button>
                        <button id="markAbsentBtn" class="btn btn-danger" style="flex:1;"><i class="fas fa-times-circle"></i> Absent</button>
                        <button id="setOTBtn" class="btn btn-primary" style="flex:1;"><i class="fas fa-clock"></i> Set OT</button>
                    </div>
                    <div id="otInputArea" style="display:none; margin-top:0.8rem;">
                        <div class="input-group">
                            <label>OT Amount (₹)</label>
                            <input type="number" id="otAmount" placeholder="300" min="0" style="width:100%; padding:0.7rem; border-radius:12px; border:1px solid #e2e8f0;">
                        </div>
                        <button id="saveOTBtn" class="btn btn-success btn-block" style="margin-top:0.5rem;"><i class="fas fa-save"></i> Save OT</button>
                    </div>
                </div>

                <!-- Payout Processing -->
                <div class="card">
                    <h3><i class="fas fa-money-check-alt"></i> Process Payouts</h3>
                    <div class="input-group" style="margin-bottom: 1rem;">
                        <label>Select Month</label>
                        <input type="month" id="payoutMonth" style="width: 100%; padding: 0.7rem; border-radius: 12px; border: 1px solid #e2e8f0;">
                    </div>
                    <button id="processPayoutBtn" class="btn btn-primary btn-block">
                        <i class="fas fa-calculator"></i> Calculate & Mark Paid
                    </button>
                    <div id="payoutResult" style="margin-top: 1rem;"></div>
                </div>
            </main>

            <nav class="bottom-nav">
                <a href="admin.html" class="nav-item active"><i class="fas fa-tachometer-alt"></i><span>Admin</span></a>
                <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Employee</span></a>
                <a href="payout.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i><span>Payouts</span></a>
            </nav>
        </div>

        <!-- Add Employee Modal -->
        <div id="addEmpModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:30; align-items:center; justify-content:center;">
            <div style="background:white; border-radius:20px; padding:1.5rem; width:90%; max-width:400px;">
                <h2>Add Employee</h2>
                <form id="addEmpForm">
                    <input type="text" id="newEmpId" placeholder="Employee ID" required style="width:100%; padding:0.8rem; margin-bottom:0.8rem; border-radius:12px; border:1px solid #e2e8f0;">
                    <input type="text" id="newEmpName" placeholder="Full Name" required style="width:100%; padding:0.8rem; margin-bottom:0.8rem; border-radius:12px; border:1px solid #e2e8f0;">
                    <input type="text" id="newEmpDept" placeholder="Department" required style="width:100%; padding:0.8rem; margin-bottom:0.8rem; border-radius:12px; border:1px solid #e2e8f0;">
                    <input type="number" id="newEmpRate" placeholder="Rate per Day (₹)" required style="width:100%; padding:0.8rem; margin-bottom:0.8rem; border-radius:12px; border:1px solid #e2e8f0;">
                    <input type="password" id="newEmpPin" placeholder="PIN (6 digits)" maxlength="6" required style="width:100%; padding:0.8rem; margin-bottom:1rem; border-radius:12px; border:1px solid #e2e8f0;">
                    <div style="display:flex; gap:0.5rem;">
                        <button type="button" id="cancelAddEmp" class="btn btn-danger" style="flex:1;">Cancel</button>
                        <button type="submit" class="btn btn-primary" style="flex:1;">Save</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="toast-container" id="toastContainer"></div>
        <div class="loading-overlay" id="loadingOverlay" style="display:none;"><div class="spinner"></div><p>Processing...</p></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
